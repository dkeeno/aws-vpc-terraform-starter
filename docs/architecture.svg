<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <style>
      .label { font-size: 12px; fill: #1a1a1a; }
      .small { font-size: 10px; fill: #555; }
      .title { font-size: 16px; fill: #1a1a1a; font-weight: 600; }
      .vpc { fill: #f4f8ff; stroke: #2b6cb0; stroke-width: 2; }
      .public { fill: #fff8e6; stroke: #d69e2e; stroke-width: 1.5; }
      .private { fill: #e6f7ee; stroke: #38a169; stroke-width: 1.5; }
      .igw { fill: #ed8936; stroke: #c05621; stroke-width: 1.5; }
      .nat { fill: #4299e1; stroke: #2b6cb0; stroke-width: 1.5; }
      .arrow { stroke: #1a202c; stroke-width: 1.5; fill: none; marker-end: url(#a); }
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a202c"/>
    </marker>
  </defs>

  <text x="360" y="28" text-anchor="middle" class="title">AWS VPC Terraform Starter — Architecture</text>

  <rect x="40" y="60" width="640" height="370" rx="8" class="vpc"/>
  <text x="55" y="80" class="label" font-weight="600">VPC 10.0.0.0/16</text>

  <rect x="240" y="100" width="80" height="30" rx="4" class="igw"/>
  <text x="280" y="120" text-anchor="middle" class="label" fill="white">IGW</text>

  <rect x="60" y="160" width="200" height="120" rx="6" class="public"/>
  <text x="160" y="180" text-anchor="middle" class="label" font-weight="600">Public Subnets (3 AZs)</text>
  <text x="160" y="200" text-anchor="middle" class="small">10.0.0.0/24, 10.0.1.0/24, 10.0.2.0/24</text>
  <rect x="105" y="218" width="50" height="36" rx="4" class="nat"/>
  <text x="130" y="240" text-anchor="middle" class="label" fill="white">NAT</text>
  <text x="170" y="240" class="small">Elastic IP</text>

  <rect x="460" y="160" width="200" height="120" rx="6" class="private"/>
  <text x="560" y="180" text-anchor="middle" class="label" font-weight="600">Private Subnets (3 AZs)</text>
  <text x="560" y="200" text-anchor="middle" class="small">10.0.10.0/24, 10.0.11.0/24, 10.0.12.0/24</text>
  <text x="560" y="240" text-anchor="middle" class="small">EKS / EC2 / RDS workloads</text>

  <rect x="60" y="320" width="600" height="80" rx="6" fill="#fafafa" stroke="#cbd5e0"/>
  <text x="80" y="340" class="label" font-weight="600">Route tables</text>
  <text x="80" y="360" class="small">Public RT  → 0.0.0.0/0 via IGW</text>
  <text x="80" y="378" class="small">Private RT → 0.0.0.0/0 via NAT Gateway</text>
  <text x="80" y="396" class="small">Single NAT (default) keeps cost ~$32/mo. enable_ha_nat = true triples it for AZ failover.</text>

  <line x1="280" y1="130" x2="280" y2="158" class="arrow"/>
  <line x1="155" y1="236" x2="455" y2="236" class="arrow"/>
</svg>
